<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ติดตามทะเบียนรถ — Moto Addict Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; }
    @media print { .no-print { display:none!important; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="alert" class="hidden fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg text-white font-medium"></div>
  <div id="loading" class="hidden fixed inset-0 z-40 bg-black bg-opacity-30 flex items-center justify-center">
    <div class="bg-white rounded-2xl p-6 text-center shadow-xl">
      <div class="w-10 h-10 border-4 border-red-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-gray-700 font-medium">กำลังโหลด...</p>
    </div>
  </div>

  <!-- Modal: Add / Edit Vehicle -->
  <div id="modal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-40 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
      <h3 class="text-base font-bold text-gray-800 mb-4" id="modalTitle">เพิ่มทะเบียนรถ</h3>
      <input type="hidden" id="m-rowIndex">
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="text-xs text-gray-500 block mb-1">เลขทะเบียน</label>
          <input type="text" id="m-reg" placeholder="กก-1234 สงขลา"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-400">
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">สาขา</label>
          <select id="m-branch" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-400">
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">ประเภทรถ</label>
          <select id="m-type" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-400">
            <option>รถจักรยานยนต์</option>
            <option>รถกระบะ</option>
            <option>รถตู้/รถบรรทุก</option>
            <option>รถยนต์</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">วันหมดอายุทะเบียน</label>
          <input type="date" id="m-expire"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-400">
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">สถานะ</label>
          <select id="m-status" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-400">
            <option>ปกติ</option>
            <option>ต่อทะเบียนแล้ว</option>
            <option>ขายแล้ว</option>
            <option>ปลดระวาง</option>
          </select>
        </div>
        <div class="col-span-2">
          <label class="text-xs text-gray-500 block mb-1">ผู้รับผิดชอบ / ผู้ใช้รถ</label>
          <input type="text" id="m-owner" placeholder="ชื่อพนักงาน / แผนก"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-400">
        </div>
        <div class="col-span-2">
          <label class="text-xs text-gray-500 block mb-1">หมายเหตุ</label>
          <input type="text" id="m-notes" placeholder="อื่นๆ..."
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-red-400">
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button onclick="closeModal()" class="flex-1 border border-gray-200 text-gray-600 py-2 rounded-xl text-sm hover:bg-gray-50">ยกเลิก</button>
        <button onclick="saveVehicle()" class="flex-1 bg-red-600 text-white py-2 rounded-xl text-sm font-semibold hover:bg-red-700">บันทึก</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200 no-print">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
      <a href="index.html" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l1.5 1M13 16l1.5-1M13 16H9m5 0h2l2-1.5V10l-2-2H9.5L8 9.5V16"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold text-gray-900">ติดตามทะเบียนรถ</h1>
        <p class="text-xs text-gray-500">บันทึกและติดตามวันหมดอายุทะเบียนรถทุกคัน</p>
      </div>
      <div class="ml-auto flex gap-2 no-print">
        <select id="filterBranch" onchange="filterData()" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none">
          <option value="">ทุกสาขา</option>
        </select>
        <select id="filterStatus" onchange="filterData()" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none">
          <option value="">ทุกสถานะ</option>
          <option value="expired">หมดอายุแล้ว</option>
          <option value="expiring">จะหมดใน 30 วัน</option>
          <option value="ok">ปกติ</option>
        </select>
        <button onclick="loadData()" class="border border-gray-200 text-gray-600 px-3 py-1.5 rounded-lg text-sm hover:bg-gray-50">รีเฟรช</button>
        <button onclick="openModal()" class="bg-red-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-red-700">
          + เพิ่มรถ
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-6">

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
        <p class="text-2xl font-bold text-gray-800" id="cnt-total">—</p>
        <p class="text-xs text-gray-500 mt-1">รถทั้งหมด</p>
      </div>
      <div class="bg-red-50 border border-red-200 rounded-2xl p-4 text-center">
        <p class="text-2xl font-bold text-red-700" id="cnt-expired">—</p>
        <p class="text-xs text-red-600 mt-1">หมดอายุแล้ว</p>
      </div>
      <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4 text-center">
        <p class="text-2xl font-bold text-yellow-700" id="cnt-expiring">—</p>
        <p class="text-xs text-yellow-600 mt-1">จะหมดใน 30 วัน</p>
      </div>
      <div class="bg-green-50 border border-green-200 rounded-2xl p-4 text-center">
        <p class="text-2xl font-bold text-green-700" id="cnt-ok">—</p>
        <p class="text-xs text-green-600 mt-1">ปกติ</p>
      </div>
    </div>

    <!-- Vehicle Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-gray-400 border-b border-gray-100">
              <th class="px-5 py-3">เลขทะเบียน</th>
              <th class="px-5 py-3">สาขา</th>
              <th class="px-5 py-3">ประเภท</th>
              <th class="px-5 py-3">วันหมดอายุ</th>
              <th class="px-5 py-3">เหลือ (วัน)</th>
              <th class="px-5 py-3">ผู้รับผิดชอบ</th>
              <th class="px-5 py-3">สถานะ</th>
              <th class="px-5 py-3 no-print">จัดการ</th>
            </tr>
          </thead>
          <tbody id="vehicleTable">
            <tr><td colspan="8" class="py-10 text-center text-gray-400">กำลังโหลด...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script src="config.js"></script>
  <script>
    let allVehicles = [];
    const today = todayISO();

    // Init
    CONFIG.BRANCHES.forEach(b => {
      ['filterBranch','m-branch'].forEach(id => {
        document.getElementById(id).innerHTML +=
          `<option value="${b}">${b}</option>`;
      });
    });
    loadData();

    async function loadData() {
      showLoading(true);
      try {
        const res = await apiGet('getVehicles');
        if (!res.success) throw new Error(res.error);
        allVehicles = res.data;
        filterData();
      } catch (err) {
        showAlert('โหลดไม่สำเร็จ: ' + err.message, 'error');
        document.getElementById('vehicleTable').innerHTML =
          '<tr><td colspan="8" class="py-8 text-center text-gray-400">ไม่สามารถโหลดข้อมูลได้ — ตรวจสอบ config.js</td></tr>';
      }
      showLoading(false);
    }

    function daysUntil(dateStr) {
      if (!dateStr) return null;
      return Math.ceil((new Date(dateStr) - new Date(today)) / 86400000);
    }

    function getExpireStatus(dateStr) {
      const days = daysUntil(dateStr);
      if (days === null) return 'unknown';
      if (days < 0)  return 'expired';
      if (days <= 30) return 'expiring';
      return 'ok';
    }

    function filterData() {
      const branchFilter = document.getElementById('filterBranch').value;
      const statusFilter = document.getElementById('filterStatus').value;

      let filtered = allVehicles.filter(v => {
        if (v.status === 'ขายแล้ว' || v.status === 'ปลดระวาง') return false;
        if (branchFilter && v.branch !== branchFilter) return false;
        if (statusFilter) {
          const s = getExpireStatus(v.expire_date);
          if (statusFilter === 'expired'  && s !== 'expired')  return false;
          if (statusFilter === 'expiring' && s !== 'expiring') return false;
          if (statusFilter === 'ok'       && s !== 'ok')       return false;
        }
        return true;
      });

      renderTable(filtered);
    }

    function renderTable(data) {
      let total = allVehicles.filter(v => v.status !== 'ขายแล้ว' && v.status !== 'ปลดระวาง').length;
      let expired = 0, expiring = 0, ok = 0;

      allVehicles.forEach(v => {
        if (v.status === 'ขายแล้ว' || v.status === 'ปลดระวาง') return;
        const s = getExpireStatus(v.expire_date);
        if (s === 'expired')  expired++;
        else if (s === 'expiring') expiring++;
        else ok++;
      });

      document.getElementById('cnt-total').textContent   = total;
      document.getElementById('cnt-expired').textContent  = expired;
      document.getElementById('cnt-expiring').textContent = expiring;
      document.getElementById('cnt-ok').textContent       = ok;

      document.getElementById('vehicleTable').innerHTML = data.map(v => {
        const days   = daysUntil(v.expire_date);
        const status = getExpireStatus(v.expire_date);

        let rowClass = '';
        let daysLabel = '—';
        let badge = '';

        if (status === 'expired') {
          rowClass  = 'bg-red-50';
          daysLabel = `<span class="text-red-600 font-bold">${Math.abs(days)} วันที่แล้ว</span>`;
          badge     = '<span class="px-2 py-0.5 bg-red-100 text-red-700 rounded-full text-xs font-medium">❌ หมดอายุ</span>';
        } else if (status === 'expiring') {
          rowClass  = 'bg-yellow-50';
          daysLabel = `<span class="text-yellow-600 font-bold">${days} วัน</span>`;
          badge     = '<span class="px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded-full text-xs font-medium">⚠️ ใกล้หมด</span>';
        } else {
          daysLabel = `<span class="text-green-600">${days ?? '—'}</span>`;
          badge     = '<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded-full text-xs font-medium">✅ ปกติ</span>';
        }

        return `<tr class="border-b border-gray-50 hover:bg-opacity-80 ${rowClass}">
          <td class="px-5 py-3 font-semibold text-gray-900">${v.reg_no}</td>
          <td class="px-5 py-3 text-gray-600">${v.branch || '—'}</td>
          <td class="px-5 py-3 text-gray-500 text-xs">${v.type || '—'}</td>
          <td class="px-5 py-3 text-gray-600">${fmtDate(v.expire_date)}</td>
          <td class="px-5 py-3">${daysLabel}</td>
          <td class="px-5 py-3 text-gray-500 text-xs">${v.owner || '—'}</td>
          <td class="px-5 py-3">${badge}</td>
          <td class="px-5 py-3 no-print">
            <button onclick='editVehicle(${JSON.stringify(v)})' class="text-xs text-blue-600 hover:text-blue-800 font-medium mr-2">แก้ไข</button>
          </td>
        </tr>`;
      }).join('') || '<tr><td colspan="8" class="py-8 text-center text-gray-400">ไม่มีรายการ</td></tr>';
    }

    function openModal() {
      document.getElementById('modalTitle').textContent = 'เพิ่มทะเบียนรถ';
      document.getElementById('m-rowIndex').value = '';
      ['m-reg','m-owner','m-notes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('m-expire').value = '';
      document.getElementById('m-status').value = 'ปกติ';
      document.getElementById('modal').classList.remove('hidden');
    }

    function editVehicle(v) {
      document.getElementById('modalTitle').textContent = 'แก้ไขทะเบียนรถ';
      document.getElementById('m-rowIndex').value = v.row_index || '';
      document.getElementById('m-reg').value    = v.reg_no || '';
      document.getElementById('m-branch').value = v.branch || CONFIG.BRANCHES[0];
      document.getElementById('m-type').value   = v.type   || '';
      document.getElementById('m-expire').value = fmtDateInput(v.expire_date);
      document.getElementById('m-owner').value  = v.owner  || '';
      document.getElementById('m-status').value = v.status || 'ปกติ';
      document.getElementById('m-notes').value  = v.notes  || '';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    async function saveVehicle() {
      const reg    = document.getElementById('m-reg').value.trim();
      const expire = document.getElementById('m-expire').value;
      if (!reg || !expire) { showAlert('กรุณากรอกเลขทะเบียนและวันหมดอายุ', 'error'); return; }

      showLoading(true);
      closeModal();
      try {
        const res = await apiPost('updateVehicle', {
          row_index:   document.getElementById('m-rowIndex').value || null,
          reg_no:      reg,
          branch:      document.getElementById('m-branch').value,
          type:        document.getElementById('m-type').value,
          expire_date: expire,
          owner:       document.getElementById('m-owner').value,
          status:      document.getElementById('m-status').value,
          notes:       document.getElementById('m-notes').value
        });
        if (!res.success) throw new Error(res.error);
        showAlert('บันทึกเรียบร้อย', 'success');
        await loadData();
      } catch (err) {
        showAlert('บันทึกไม่สำเร็จ: ' + err.message, 'error');
      }
      showLoading(false);
    }
  </script>
</body>
</html>
